<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Напоминалка">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="description" content="Приложение-напоминалка с дедлайнами">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>Напоминалка</title>
</head>
<body>

  <div class="app">
    <header class="header">
      <h1 class="header-date" id="dateDisplay"></h1>
      <div class="header-sub">Задачи</div>
    </header>

    <main class="task-list" id="taskList"></main>

    <div class="stats" id="stats"></div>
  </div>

  <button class="fab" id="addBtn" aria-label="Добавить задачу">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div class="overlay" id="modalOverlay">
    <div class="sheet">
      <div class="sheet-bar"></div>
      <h2 class="sheet-title">Новая задача</h2>
      <form id="taskForm">
        <input type="text" id="taskTitle" class="input" placeholder="Что нужно сделать?" required autocomplete="off">

        <div class="row">
          <div class="col">
            <label class="label" for="taskDate">Дата</label>
            <input type="date" id="taskDate" class="input" required>
          </div>
          <div class="col">
            <label class="label" for="taskTime">Время</label>
            <input type="time" id="taskTime" class="input" required>
          </div>
        </div>

        <label class="label">Приоритет</label>
        <div class="chips">
          <label class="chip"><input type="radio" name="priority" value="high"><span class="chip-body chip-h"><span class="dot dot-r"></span>Срочно</span></label>
          <label class="chip"><input type="radio" name="priority" value="medium"><span class="chip-body chip-m"><span class="dot dot-o"></span>Важно</span></label>
          <label class="chip"><input type="radio" name="priority" value="none" checked><span class="chip-body">Без метки</span></label>
        </div>

        <label class="toggle">
          <span>Повторять ежедневно</span>
          <input type="checkbox" id="taskRepeat">
          <span class="track"><span class="thumb"></span></span>
        </label>

        <div class="actions">
          <button type="button" class="btn btn-sec" id="cancelBtn">Отмена</button>
          <button type="submit" class="btn btn-pri">Добавить</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-messaging-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
